<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joining Quiz | Quant-Elite</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .invite-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .invite-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { margin-bottom: 20px; font-size: 2rem; }
        p { margin-bottom: 15px; color: #cbd5e1; }
        .btn-download {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .footer-text {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="invite-container">
        <div class="invite-card">
            <div class="loader" style="margin: 0 auto 30px;"></div>
            <h1>Joining Quiz...</h1>
            <p>We're taking you to the <strong>Quant-Elite</strong> app to join the quiz.</p>
            <p>If the app doesn't open automatically, you may need to install it or use the link below.</p>
            <a href="https://theuniquedawg29-cloud.github.io/quant-elite-website/install-guide.html" class="btn-download">Get Quant-Elite App</a>
        </div>
        <p class="footer-text">&copy; 2026 Santosh TechWorks</p>
    </div>
</body>
</html>
