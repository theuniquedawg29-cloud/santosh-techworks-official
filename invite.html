<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joining Quiz | Quant-Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --navy: #1e1b4b;
            --dark: #0f172a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: var(--dark);
        }

        .invite-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at top right, var(--navy), var(--dark));
            color: var(--white);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Ambient background blobs for visual appeal */
        .ambient-blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            max-width: 400px;
            max-height: 400px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; }

        .invite-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 24px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .loader-wrapper {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 32px;
        }

        .loader {
            border: 4px solid rgba(245, 158, 11, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 100%;
            height: 100%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader-inner {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-right-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 16px;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        h1 span {
            background: linear-gradient(135deg, var(--white) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 32px;
            padding: 16px 28px;
            background: var(--primary);
            color: var(--navy);
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        .btn-download:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(245, 158, 11, 0.35);
            background: var(--white);
            color: var(--dark);
        }

        .footer-text {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* Responsive Breakpoints */
        @media (min-width: 640px) {
            .invite-card {
                padding: 56px 40px;
                max-width: 500px;
            }
            h1 {
                font-size: 2.25rem;
            }
            p {
                font-size: 1.1rem;
            }
            .btn-download {
                width: auto;
                min-width: 240px;
            }
        }

        @media (max-height: 600px) {
            .invite-card {
                padding: 30px 20px;
            }
            .loader-wrapper {
                margin-bottom: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .btn-download {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="invite-container">
        <!-- Background Elements -->
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>

        <!-- Main Card -->
        <div class="invite-card">
            <div class="loader-wrapper">
                <div class="loader"></div>
                <div class="loader-inner"></div>
            </div>

            <h1>Joining <span>Quiz...</span></h1>

            <p>We're taking you to the <strong>Quant-Elite</strong> app to join the quiz.</p>
            <p>If the app doesn't open automatically, you may need to install it or use the link below.</p>

            <a href="https://theuniquedawg29-cloud.github.io/santosh-techworks-official/install-guide.html" class="btn-download">Get Quant-Elite App</a>
        </div>

        <p class="footer-text">&copy; 2026 Santosh TechWorks</p>
    </div>
</body>
</html>
